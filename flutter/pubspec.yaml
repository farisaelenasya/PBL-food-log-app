name: glucoguide
description: "Aplikasi Food Log untuk pasien diabetes"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # YT (AMAN WEB + MOBILE)
  youtube_player_iframe: ^5.2.2
  url_launcher: ^6.3.2

  # UI
  cupertino_icons: ^1.0.8

  # Storage

  shared_preferences: ^2.3.3

  # Image & Camera
  image_picker: ^1.2.2

  # Env
  flutter_dotenv: ^5.2.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0

  # State Management
  provider: ^6.1.2

  # Networking
  http: ^1.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4        

  # Charts
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/env/.env
    - assets/images/logo_foodlog.png